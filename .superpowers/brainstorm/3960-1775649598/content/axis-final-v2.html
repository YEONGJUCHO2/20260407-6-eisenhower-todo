<h2>축 화살표 — 중요 텍스트 방향 수정</h2>

<div class="cards">
  <div class="card" data-choice="final" onclick="toggleSelect(this)">
    <div class="card-image" style="padding: 24px; background: #131317;">
      <div style="max-width: 300px; margin: 0 auto;">

        <!-- "긴급" label above arrow -->
        <div style="margin-left: 28px; text-align: center; margin-bottom: 2px;">
          <span style="font-size: 10px; font-weight: 600; color: #ffb3ad; letter-spacing: 2px;">긴급</span>
        </div>

        <!-- Horizontal arrow ← -->
        <div style="margin-left: 28px; position: relative; height: 14px; margin-bottom: 8px;">
          <svg style="width: 100%; height: 100%;" viewBox="0 0 270 14" preserveAspectRatio="none">
            <defs><linearGradient id="hArr2" x1="100%" y1="0%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ffb3ad" stop-opacity="0.05"/><stop offset="50%" stop-color="#ffb3ad" stop-opacity="0.3"/><stop offset="100%" stop-color="#ffb3ad" stop-opacity="0.6"/></linearGradient></defs>
            <polygon points="270,6.5 18,4.5 18,9.5 270,7.5" fill="url(#hArr2)"/>
            <polygon points="20,1 4,7 20,13" fill="rgba(255,179,173,0.6)"/>
          </svg>
        </div>

        <div style="display: flex;">
          <!-- Left side: "중요" label + vertical arrow ↑ -->
          <div style="display: flex; align-items: stretch; margin-right: 8px;">
            <!-- "중요" vertical text, LEFT of arrow, top-to-bottom reading -->
            <div style="display: flex; align-items: center; margin-right: 3px;">
              <span style="writing-mode: vertical-lr; font-size: 10px; font-weight: 600; color: #adc6ff; letter-spacing: 2px;">중요</span>
            </div>
            <!-- Vertical arrow ↑ -->
            <div style="position: relative; width: 14px;">
              <svg style="width: 100%; height: 100%;" viewBox="0 0 14 200" preserveAspectRatio="none">
                <defs><linearGradient id="vArr2" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#adc6ff" stop-opacity="0.05"/><stop offset="50%" stop-color="#adc6ff" stop-opacity="0.3"/><stop offset="100%" stop-color="#adc6ff" stop-opacity="0.6"/></linearGradient></defs>
                <polygon points="6.5,200 4.5,18 9.5,18 7.5,200" fill="url(#vArr2)"/>
                <polygon points="1,20 7,4 13,20" fill="rgba(173,198,255,0.6)"/>
              </svg>
            </div>
          </div>

          <!-- 2x2 Matrix grid -->
          <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
            <div style="background: rgba(255,84,81,0.1); border-radius: 10px; padding: 10px; border-left: 2px solid #ff5451; min-height: 80px;">
              <div style="font-size: 10px; font-weight: 700; color: #ffb3ad; text-transform: uppercase; letter-spacing: 1px;">DO</div>
              <div style="font-size: 10px; color: #c2c6d6; margin-top: 4px; line-height: 1.3;">지금 바로<br/>실행하세요</div>
            </div>
            <div style="background: rgba(5,102,217,0.1); border-radius: 10px; padding: 10px; border-left: 2px solid #0566d9; min-height: 80px;">
              <div style="font-size: 10px; font-weight: 700; color: #adc6ff; text-transform: uppercase; letter-spacing: 1px;">PLAN</div>
              <div style="font-size: 10px; color: #c2c6d6; margin-top: 4px; line-height: 1.3;">일정을 잡아<br/>계획하세요</div>
            </div>
            <div style="background: rgba(202,129,0,0.1); border-radius: 10px; padding: 10px; border-left: 2px solid #ca8100; min-height: 80px;">
              <div style="font-size: 10px; font-weight: 700; color: #ffb95f; text-transform: uppercase; letter-spacing: 1px;">DELEGATE</div>
              <div style="font-size: 10px; color: #c2c6d6; margin-top: 4px; line-height: 1.3;">다른 사람에게<br/>맡기세요</div>
            </div>
            <div style="background: rgba(66,71,84,0.1); border-radius: 10px; padding: 10px; border-left: 2px solid #424754; min-height: 80px;">
              <div style="font-size: 10px; font-weight: 700; color: #8c909f; text-transform: uppercase; letter-spacing: 1px;">DELETE</div>
              <div style="font-size: 10px; color: #c2c6d6; margin-top: 4px; line-height: 1.3;">과감하게<br/>버리세요</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>중요 텍스트 방향 수정</h3>
      <p>writing-mode: vertical-lr — 위에서 아래로 자연스럽게 읽히도록 수정.</p>
    </div>
  </div>
</div>
