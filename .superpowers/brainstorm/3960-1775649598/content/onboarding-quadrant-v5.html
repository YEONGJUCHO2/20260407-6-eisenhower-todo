<h2>온보딩 — 라벨 위치 최종</h2>
<p class="subtitle">"긴급" 화살표 위, "중요" 화살표 왼쪽</p>

<div class="cards">
  <div class="card" data-choice="final" onclick="toggleSelect(this)">
    <div class="card-image" style="padding: 0; background: #131317;">
      <div style="max-width: 320px; margin: 0 auto; padding: 24px 20px;">
        <!-- Title -->
        <div style="text-align: center; margin-bottom: 24px;">
          <span style="font-size: 36px; display: block; margin-bottom: 8px;">📊</span>
          <div style="font-size: 20px; font-weight: 700; color: #e4e1e7; font-family: sans-serif;">아이젠하워 매트릭스</div>
          <div style="font-size: 13px; color: #8c909f; margin-top: 6px;">할 일을 긴급/중요로 나눠 4가지로 분류하세요</div>
        </div>

        <div style="display: flex;">
          <!-- Left column: "중요" label (rotated, LEFT of arrow) + vertical arrow -->
          <div style="display: flex; align-items: center; margin-right: 2px;">
            <!-- "중요" text, rotated 90deg, to the LEFT of the arrow -->
            <div style="writing-mode: vertical-rl; transform: rotate(180deg); margin-right: 3px;">
              <span style="font-size: 9px; font-weight: 600; color: #adc6ff; letter-spacing: 2px;">중요</span>
            </div>
            <!-- Vertical arrow: bottom(transparent/thin) → top(thick/opaque) -->
            <div style="position: relative; width: 12px; height: 100%; min-height: 220px;">
              <svg style="width: 100%; height: 100%;" viewBox="0 0 12 220" preserveAspectRatio="none">
                <defs><linearGradient id="vUp5" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#adc6ff" stop-opacity="0"/><stop offset="40%" stop-color="#adc6ff" stop-opacity="0.12"/><stop offset="70%" stop-color="#adc6ff" stop-opacity="0.3"/><stop offset="100%" stop-color="#adc6ff" stop-opacity="0.55"/></linearGradient></defs>
                <polygon points="5.5,220 3,30 9,30 6.5,220" fill="url(#vUp5)"/>
                <polygon points="1,32 6,14 11,32" fill="rgba(173,198,255,0.55)"/>
              </svg>
            </div>
          </div>

          <!-- Right column: horizontal arrow + grid -->
          <div style="flex: 1;">
            <!-- "긴급" label ABOVE arrow, centered -->
            <div style="text-align: center; margin-bottom: 1px;">
              <span style="font-size: 9px; font-weight: 600; color: #ffb3ad; letter-spacing: 2px;">긴급</span>
            </div>
            <!-- Horizontal arrow: right(transparent/thin) → left(thick/opaque) -->
            <div style="position: relative; height: 12px; margin-bottom: 4px;">
              <svg style="width: 100%; height: 100%;" viewBox="0 0 270 12" preserveAspectRatio="none">
                <defs><linearGradient id="hL5" x1="100%" y1="0%" x2="0%" y2="0%"><stop offset="0%" stop-color="#ffb3ad" stop-opacity="0"/><stop offset="40%" stop-color="#ffb3ad" stop-opacity="0.12"/><stop offset="70%" stop-color="#ffb3ad" stop-opacity="0.3"/><stop offset="100%" stop-color="#ffb3ad" stop-opacity="0.55"/></linearGradient></defs>
                <polygon points="270,5.5 40,3 40,9 270,6.5" fill="url(#hL5)"/>
                <polygon points="42,1 26,6 42,11" fill="rgba(255,179,173,0.55)"/>
              </svg>
            </div>

            <!-- 2x2 Grid -->
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
              <div style="background: rgba(255,84,81,0.1); border-radius: 8px; padding: 10px; border-left: 2px solid #ff5451; min-height: 76px;">
                <div style="font-size: 10px; font-weight: 700; color: #ffb3ad; text-transform: uppercase; letter-spacing: 1px;">DO</div>
                <div style="font-size: 10px; color: #c2c6d6; margin-top: 4px; line-height: 1.3;">지금 바로<br/>실행하세요</div>
              </div>
              <div style="background: rgba(5,102,217,0.1); border-radius: 8px; padding: 10px; border-left: 2px solid #0566d9; min-height: 76px;">
                <div style="font-size: 10px; font-weight: 700; color: #adc6ff; text-transform: uppercase; letter-spacing: 1px;">PLAN</div>
                <div style="font-size: 10px; color: #c2c6d6; margin-top: 4px; line-height: 1.3;">일정을 잡아<br/>계획하세요</div>
              </div>
              <div style="background: rgba(202,129,0,0.1); border-radius: 8px; padding: 10px; border-left: 2px solid #ca8100; min-height: 76px;">
                <div style="font-size: 10px; font-weight: 700; color: #ffb95f; text-transform: uppercase; letter-spacing: 1px;">DELEGATE</div>
                <div style="font-size: 10px; color: #c2c6d6; margin-top: 4px; line-height: 1.3;">다른 사람에게<br/>맡기세요</div>
              </div>
              <div style="background: rgba(66,71,84,0.1); border-radius: 8px; padding: 10px; border-left: 2px solid #424754; min-height: 76px;">
                <div style="font-size: 10px; font-weight: 700; color: #8c909f; text-transform: uppercase; letter-spacing: 1px;">DELETE</div>
                <div style="font-size: 10px; color: #c2c6d6; margin-top: 4px; line-height: 1.3;">과감하게<br/>버리세요</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Highlight -->
        <div style="text-align: center; padding: 12px; background: rgba(5,102,217,0.08); border-radius: 8px; margin-top: 20px;">
          <div style="font-size: 12px; color: #adc6ff; font-weight: 500;">💡 가장 중요한 건 <strong>PLAN</strong></div>
          <div style="font-size: 11px; color: #adc6ff; margin-top: 6px; opacity: 0.8;">— 여기가 인생을 바꾸는 곳입니다</div>
        </div>

        <!-- Dots + button -->
        <div style="display: flex; gap: 6px; justify-content: center; margin-top: 24px;">
          <div style="width: 20px; height: 6px; border-radius: 3px; background: #0566d9;"></div>
          <div style="width: 6px; height: 6px; border-radius: 3px; background: rgba(140,144,159,0.3);"></div>
          <div style="width: 6px; height: 6px; border-radius: 3px; background: rgba(140,144,159,0.3);"></div>
        </div>
        <div style="margin-top: 12px; display: flex; gap: 12px;">
          <span style="font-size: 13px; color: #8c909f; padding: 10px;">건너뛰기</span>
          <div style="flex: 1; background: linear-gradient(to right, #0566d9, #0450b0); border-radius: 999px; padding: 12px; text-align: center; font-size: 14px; font-weight: 600; color: #fff;">다음</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>최종</h3>
      <p>"중요" = 세로 화살표 왼쪽에 눕혀서 중앙. "긴급" = 가로 화살표 위에 중앙. PLAN 강조 텍스트 줄바꿈.</p>
    </div>
  </div>
</div>
