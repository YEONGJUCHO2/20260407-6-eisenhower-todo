<h2>그라디언트 화살표 축 v2</h2>
<p class="subtitle">오른쪽 끝 = 긴급, 아래 끝 = 중요. 가늘고 투명 → 굵고 진하게</p>

<div class="section">
  <h3>다크 모드</h3>
  <div style="max-width: 340px; margin: 0 auto; background: #131317; border-radius: 12px; padding: 20px; border: 1px solid rgba(255,255,255,0.06);">

    <!-- Horizontal arrow: left(비긴급) → right(긴급). 왼쪽 가늘고 투명 → 오른쪽 굵고 진함 -->
    <div style="position: relative; height: 24px; margin-bottom: 4px; margin-left: 28px;">
      <!-- Arrow line: SVG for variable thickness -->
      <svg style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%;" viewBox="0 0 300 24" preserveAspectRatio="none">
        <defs>
          <linearGradient id="hGradD" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ffb3ad" stop-opacity="0.0"/>
            <stop offset="40%" stop-color="#ffb3ad" stop-opacity="0.15"/>
            <stop offset="70%" stop-color="#ffb3ad" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#ffb3ad" stop-opacity="0.7"/>
          </linearGradient>
        </defs>
        <!-- Tapered line: starts thin (0.5px) → ends thick (4px) -->
        <polygon points="0,11.5 240,8 240,16 0,12.5" fill="url(#hGradD)"/>
        <!-- Arrow head -->
        <polygon points="238,5 258,12 238,19" fill="rgba(255,179,173,0.7)"/>
      </svg>
      <!-- Label at right end -->
      <div style="position: absolute; top: 50%; right: -6px; transform: translate(100%, -50%); padding-left: 2px;">
        <span style="font-size: 10px; font-weight: 600; color: #ffb3ad; letter-spacing: 1px;">긴급</span>
      </div>
    </div>

    <div style="display: flex;">
      <!-- Vertical arrow: top(비중요) → bottom(중요). 위쪽 가늘고 투명 → 아래 굵고 진함 -->
      <div style="position: relative; width: 24px; margin-right: 4px;">
        <svg style="width: 100%; height: 100%; min-height: 200px;" viewBox="0 0 24 200" preserveAspectRatio="none">
          <defs>
            <linearGradient id="vGradD" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#adc6ff" stop-opacity="0.0"/>
              <stop offset="40%" stop-color="#adc6ff" stop-opacity="0.15"/>
              <stop offset="70%" stop-color="#adc6ff" stop-opacity="0.35"/>
              <stop offset="100%" stop-color="#adc6ff" stop-opacity="0.7"/>
            </linearGradient>
          </defs>
          <polygon points="11.5,0 8,165 16,165 12.5,0" fill="url(#vGradD)"/>
          <polygon points="5,163 12,183 19,163" fill="rgba(173,198,255,0.7)"/>
        </svg>
        <!-- Label at bottom -->
        <div style="position: absolute; bottom: -4px; left: 50%; transform: translate(-50%, 100%);">
          <span style="font-size: 10px; font-weight: 600; color: #adc6ff; letter-spacing: 1px;">중요</span>
        </div>
      </div>

      <!-- Matrix 2x2 -->
      <div style="flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 4px;">
        <div style="background: rgba(255,84,81,0.1); border-left: 2px solid #ff5451; border-radius: 8px; padding: 10px; min-height: 80px;">
          <div style="font-size: 9px; font-weight: 700; color: #ffb3ad; text-transform: uppercase; letter-spacing: 1px;">DO</div>
          <div style="font-size: 11px; color: #e4e1e7; margin-top: 6px;">미팅 준비</div>
          <div style="font-size: 11px; color: #e4e1e7; margin-top: 2px;">보고서 제출</div>
        </div>
        <div style="background: rgba(5,102,217,0.1); border-left: 2px solid #0566d9; border-radius: 8px; padding: 10px; min-height: 80px;">
          <div style="font-size: 9px; font-weight: 700; color: #adc6ff; text-transform: uppercase; letter-spacing: 1px;">PLAN</div>
          <div style="font-size: 11px; color: #e4e1e7; margin-top: 6px;">독서 계획</div>
        </div>
        <div style="background: rgba(202,129,0,0.1); border-left: 2px solid #ca8100; border-radius: 8px; padding: 10px; min-height: 80px;">
          <div style="font-size: 9px; font-weight: 700; color: #ffb95f; text-transform: uppercase; letter-spacing: 1px;">DELEGATE</div>
          <div style="font-size: 11px; color: #e4e1e7; margin-top: 6px;">자료 정리</div>
        </div>
        <div style="background: rgba(66,71,84,0.1); border-left: 2px solid #424754; border-radius: 8px; padding: 10px; min-height: 80px;">
          <div style="font-size: 9px; font-weight: 700; color: #8c909f; text-transform: uppercase; letter-spacing: 1px;">DELETE</div>
          <div style="font-size: 11px; color: #e4e1e7; margin-top: 6px;">SNS 확인</div>
        </div>
      </div>
    </div>
  </div>
</div>
